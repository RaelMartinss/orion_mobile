name: orion_mobile
description: "Orion Mobile — assistente de voz para Android"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  shared_preferences: ^2.3.0
  permission_handler: ^11.3.0
  url_launcher: ^6.3.0
  android_intent_plus: ^5.0.0
  camera: ^0.11.0
  livekit_client: ^2.7.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

# Ícone do app — substitui o ícone padrão do Flutter.
# Salve a arte escolhida (PNG 1024x1024) em assets/icon/orion.png e rode:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/orion.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/orion.png"

# Splash screen — tela de abertura com o ícone do Orion sobre fundo preto.
# Depois de mexer aqui, rode: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0A0A0A"
  image: assets/icon/orion.png
  android: true
  ios: false
  web: false
  android_12:
    image: assets/icon/orion.png
    color: "#0A0A0A"
